<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 3: AI Agents for Research</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
/* ── ARIA Academic Design System ────────────────────────────── */
:root {
    --color-primary: #1a365d;
    --color-secondary: #2c5282;
    --color-accent: #3182ce;
    --color-accent-light: #63b3ed;
    --color-warm: #dd6b20;
    --color-success: #38a169;
    --color-text: #1a202c;
    --color-text-secondary: #2d3748;
    --color-text-muted: #5a6577;
    --color-bg: #ffffff;
    --color-bg-alt: #f7fafc;
    --color-bg-code: #1e293b;
    --color-border: #e2e8f0;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --max-width: 1100px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; font-size: 17px; }

body {
    font-family: var(--font-sans);
    color: var(--color-text);
    line-height: 1.7;
    background: var(--color-bg);
    -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-serif);
    font-weight: 500;
    line-height: 1.3;
    color: var(--color-primary);
}

a { color: var(--color-accent); text-decoration: none; }
a:hover { text-decoration: underline; color: var(--color-secondary); }

p { color: var(--color-text); }

/* ── Top Nav ── */
.topnav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--color-border);
    padding: 0 2rem;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
}
.topnav .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-serif);
    font-size: 1.25rem; font-weight: 600; color: var(--color-primary);
    text-decoration: none;
}
.topnav .brand:hover { text-decoration: none; }
.topnav .brand span { color: var(--color-accent); }
.topnav .client-badge {
    background: var(--color-primary);
    color: white;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

/* ── Layout ── */
.main { padding-top: 64px; }

/* ── Landing Page ── */
.hero {
    text-align: center;
    padding: 6rem 2rem 4rem;
    background: linear-gradient(180deg, var(--color-bg-alt) 0%, var(--color-bg) 100%);
}
.hero-badge {
    display: inline-block;
    background: var(--color-primary);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    margin-bottom: 1.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: var(--font-sans);
}
.hero h1 {
    font-size: 3rem;
    font-weight: 600;
    color: var(--color-primary);
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
}
.hero .hero-subtitle {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    font-style: italic;
    color: var(--color-text-muted);
    margin-bottom: 1rem;
}
.hero p {
    color: var(--color-text-secondary);
    font-size: 1.05rem;
    max-width: 620px;
    margin: 0 auto 1rem;
    line-height: 1.7;
}
.hero .meta {
    display: flex; gap: 1.5rem; justify-content: center; margin-top: 2.5rem;
    flex-wrap: wrap;
}
.hero .meta-item {
    background: white;
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.2rem 1.8rem;
    text-align: center;
    transition: all 0.2s;
}
.hero .meta-item:hover {
    border-color: var(--color-accent);
    box-shadow: 0 4px 20px rgba(49, 130, 206, 0.08);
}
.hero .meta-item .number {
    font-family: var(--font-serif);
    font-size: 2rem; font-weight: 600; color: var(--color-accent-light);
    line-height: 1;
    margin-bottom: 0.4rem;
}
.hero .meta-item .label {
    font-size: 0.75rem; color: var(--color-text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 500;
}

/* ── Module Cards ── */
.modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 2rem 4rem;
}
.module-card {
    background: white;
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 2rem;
    transition: all 0.2s;
    text-decoration: none;
    color: var(--color-text);
    display: block;
    position: relative;
    overflow: hidden;
}
.module-card:hover {
    border-color: var(--color-accent);
    box-shadow: 0 4px 24px rgba(49, 130, 206, 0.1);
    transform: translateY(-2px);
    text-decoration: none;
}
.module-card .card-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.module-card .icon { font-size: 2.2rem; margin-bottom: 1rem; }
.module-card .module-num {
    font-family: var(--font-sans);
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--color-text-muted); margin-bottom: 0.3rem;
    font-weight: 600;
}
.module-card h3 {
    font-family: var(--font-serif);
    font-size: 1.25rem; font-weight: 500; margin-bottom: 0.5rem;
    color: var(--color-primary);
}
.module-card .subtitle { color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
.module-card .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--color-border);
}
.module-card .duration { font-size: 0.85rem; color: var(--color-text-muted); }
.status {
    font-family: var(--font-sans);
    font-size: 0.7rem; font-weight: 600; padding: 4px 12px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em;
}
.status.complete { background: #f0fff4; color: var(--color-success); border: 1px solid #c6f6d5; }
.status.in_progress { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
.status.planned { background: var(--color-bg-alt); color: var(--color-text-muted); border: 1px solid var(--color-border); }

/* ── Module Detail ── */
.module-detail {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
}
.breadcrumb {
    font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 2rem;
}
.breadcrumb a { color: var(--color-text-muted); }
.breadcrumb a:hover { color: var(--color-accent); text-decoration: none; }
.module-header {
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--color-border);
}
.module-header .icon { font-size: 3rem; margin-bottom: 1rem; }
.module-header h1 {
    font-family: var(--font-serif);
    font-size: 2rem; font-weight: 500; margin-bottom: 0.5rem;
    color: var(--color-primary);
}
.module-header .subtitle { color: var(--color-text-muted); font-size: 1.05rem; font-family: var(--font-serif); font-style: italic; }

.file-list { display: flex; flex-direction: column; gap: 0.6rem; }
.file-link {
    display: flex; align-items: center; gap: 1rem;
    background: white;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 1rem 1.5rem;
    color: var(--color-text);
    transition: all 0.2s;
    text-decoration: none;
}
.file-link:hover {
    border-color: var(--color-accent);
    box-shadow: 0 2px 12px rgba(49, 130, 206, 0.08);
    text-decoration: none;
}
.file-link .file-icon { font-size: 1.4rem; }
.file-link .file-info { flex: 1; }
.file-link .file-title { font-weight: 500; color: var(--color-primary); }
.file-link .file-name { font-size: 0.8rem; color: var(--color-text-muted); font-family: var(--font-mono); }
.file-link .arrow { color: var(--color-text-muted); font-size: 1.1rem; }

/* ── Content View ── */
.content-view {
    max-width: 820px;
    margin: 0 auto;
    padding: 2rem;
}
.content-body {
    background: white;
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 3rem;
}
.content-body h1 {
    font-family: var(--font-serif);
    font-size: 1.8rem; font-weight: 500; margin: 2.5rem 0 1rem;
    color: var(--color-primary);
}
.content-body h1:first-child { margin-top: 0; }
.content-body h2 {
    font-family: var(--font-serif);
    font-size: 1.5rem; font-weight: 500; margin: 2.5rem 0 0.8rem;
    color: var(--color-primary);
    padding-top: 1.5rem;
    border-top: 1px solid var(--color-border);
}
.content-body h3 {
    font-family: var(--font-serif);
    font-size: 1.2rem; font-weight: 500; margin: 1.5rem 0 0.6rem;
    color: var(--color-secondary);
}
.content-body h4 {
    font-family: var(--font-serif);
    font-size: 1.05rem; font-weight: 500; margin: 1.2rem 0 0.5rem;
    color: var(--color-text);
}
.content-body p {
    margin: 0.6rem 0;
    color: var(--color-text);
    line-height: 1.8;
}
.content-body li {
    margin: 0.4rem 0; padding-left: 0.5rem;
    color: var(--color-text);
    line-height: 1.7;
}
.content-body blockquote {
    border-left: 4px solid var(--color-accent);
    padding: 1rem 1.5rem;
    margin: 1.5rem 0;
    background: var(--color-bg-alt);
    border-radius: 0 8px 8px 0;
    font-family: var(--font-serif);
    font-style: italic;
    color: var(--color-text);
}
.content-body hr {
    border: none; border-top: 1px solid var(--color-border);
    margin: 2.5rem 0;
}
.content-body pre {
    background: var(--color-bg-code);
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    overflow-x: auto;
    margin: 1.2rem 0;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    line-height: 1.45;
    color: #e2e8f0;
    max-height: 500px;
    overflow-y: auto;
}
.content-body code.inline {
    background: #edf2f7;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.88em;
    font-family: var(--font-mono);
    color: var(--color-secondary);
}
.content-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.2rem 0;
    font-size: 0.9rem;
}
.content-body th {
    background: var(--color-bg-alt);
    padding: 0.7rem 1rem;
    text-align: left;
    font-weight: 600;
    font-family: var(--font-sans);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-muted);
    border-bottom: 2px solid var(--color-border);
}
.content-body td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--color-border);
    color: var(--color-text);
}
.content-body .check { margin-right: 0.3rem; }
.content-body strong { color: var(--color-text); font-weight: 600; }

/* ── Notebook Cells ── */
.nb-cell { margin: 1.5rem 0; }
.nb-markdown { }
.nb-code {
    background: var(--color-bg-code);
    border: 1px solid #334155;
    border-radius: 8px;
    overflow: hidden;
}
.nb-code .cell-label {
    padding: 0.5rem 1.2rem;
    font-size: 0.75rem;
    color: #94a3b8;
    font-family: var(--font-mono);
    background: #162032;
    border-bottom: 1px solid #334155;
}
.nb-code pre {
    margin: 0;
    border: none;
    border-radius: 0;
    max-height: 500px;
    overflow-y: auto;
    font-size: 0.82rem;
    line-height: 1.45;
}

/* ── Footer ── */
.footer {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--color-text-muted);
    font-size: 0.85rem;
    border-top: 1px solid var(--color-border);
    margin-top: 3rem;
}

/* ── Stats Bar ── */
.stats-bar {
    background: var(--color-primary);
    padding: 2rem 0;
}
.stats-bar .container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 2rem;
}

/* ── Progress Bar ── */
.progress-section {
    max-width: var(--max-width);
    margin: 0 auto 3rem;
    padding: 0 2rem;
}
.progress-bar-outer {
    background: white;
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
}
.progress-bar-outer h3 {
    font-family: var(--font-sans);
    font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 1rem;
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 600;
}
.progress-track {
    background: #edf2f7;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 0.8rem;
}
.progress-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
    transition: width 0.5s;
}
.progress-stats {
    display: flex; gap: 2rem; font-size: 0.85rem; color: var(--color-text-muted);
}
.progress-stats strong { color: var(--color-text); }

@media (max-width: 768px) {
    html { font-size: 16px; }
    .hero h1 { font-size: 2.2rem; }
    .modules-grid { grid-template-columns: 1fr; }
    .content-body { padding: 1.5rem; }
    .hero .meta { gap: 0.8rem; }
    .hero { padding: 4rem 1.5rem 3rem; }
}
</style>
</head>
<body>
    <nav class="topnav">
        <a href="/agentic-ai-course/index.html" class="brand"><span>⬡</span> Agentic AI Certification</a>
        <div class="client-badge">ConsultBae India — Client Preview</div>
    </nav>

    <div class="main">
        <div class="module-detail">
            <div class="breadcrumb">
                <a href="/agentic-ai-course/index.html">All Modules</a> / Module 3
            </div>

            <div class="module-header">
                <div class="icon">🔬</div>
                <div style="display:flex;align-items:center;gap:1rem;">
                    <h1>Module 3: AI Agents for Research</h1>
                    <span class="status planned">Planned</span>
                </div>
                <div class="subtitle">Data Ingestion, Synthesis, and Autonomous Research Assistants</div>
                <div style="margin-top:0.8rem;color:var(--text-dim);font-size:0.9rem;">Duration: ~9 hours &bull; 0 files</div>
            </div>

            <div class="file-list">
                
            </div>
        </div>
    </div>

    <footer class="footer">
        Agentic AI Certification Program &mdash; Built for ConsultBae India
    </footer>
</body>
</html>
